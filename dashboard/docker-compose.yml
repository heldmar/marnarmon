services:
  dashboard:
    build: .
    image: marnarmon-dashboard:latest
    pull_policy: build
    container_name: marnarmon-dashboard
    ports:
      - "8080:80"
    environment:
      # Browser-facing API base. "/api" = same-origin reverse proxy: the browser
      # calls https://<this-domain>/api/... and nginx forwards to API_UPSTREAM.
      # This is required when the dashboard is served over public HTTPS — it
      # avoids the mixed-content block and the unreachable private LAN IP.
      # (For direct LAN-only access you could instead set a full URL here and
      # ignore API_UPSTREAM, but then it won't work off the LAN.)
      API_BASE_URL: "/api"
      # Where nginx forwards /api/ — the host agent as reached FROM THE
      # CONTAINER. The default resolves the Docker host via the host-gateway
      # mapping below, so it works on a single-host setup with no server-specific
      # value baked into this public file. Override with your host's LAN IP
      # (e.g. http://10.0.0.5:8787) by setting API_UPSTREAM in your env / the
      # Portainer stack's Environment variables if host.docker.internal can't
      # reach the agent on your network. Only used in same-origin proxy mode.
      API_UPSTREAM: "${API_UPSTREAM:-http://host.docker.internal:8787}"
      # Poll interval in seconds (default 300 = 5 min).
      REFRESH_SECONDS: "300"
      # Server Logs "Live" auto-refresh interval in seconds (default 10). Only
      # used when Server Logs is enabled on the host agent (logs.enabled).
      LOGS_REFRESH_SECONDS: "10"
      # Docker Monitor "Live" auto-refresh interval in seconds (default 15;
      # kept modest so each poll's docker CLI shell-out stays light on a Pi).
      # Only used when Docker Monitor is enabled on the host agent (docker.enabled).
      DOCKER_REFRESH_SECONDS: "15"
      # Bearer token if the host API has auth enabled. Do NOT hardcode a secret
      # here (this file is public) — set it as a stack/environment variable
      # (Portainer: stack "Environment variables"; CLI: an .env file). In the
      # default same-origin proxy mode the entrypoint injects it server-side, so
      # it never reaches the browser.
      API_TOKEN: "${API_TOKEN:-}"
    # Resolve host.docker.internal to the Docker host so the default API_UPSTREAM
    # works without a server-specific IP (Linux needs this mapping explicitly).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    # To front this with a reverse proxy that reaches the container by name
    # (Nginx Proxy Manager, Traefik, …), join that proxy's shared external
    # network — see "Deploying behind a reverse proxy" in README.md. Left out
    # here so `docker compose up` works out-of-the-box on any single host.
