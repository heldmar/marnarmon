server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Same-origin API proxy: the browser calls /api/... on this domain and
    # nginx forwards to the host agent. This avoids the mixed-content block
    # (HTTPS page -> HTTP API) and the private-IP problem when the dashboard is
    # served over public HTTPS. The proxy target is written by the entrypoint
    # from $API_UPSTREAM at container start, so one image still targets any host.
    include /etc/nginx/marnarmon-api-proxy.conf;

    # SPA fallback: route everything to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Runtime config must never be cached (it changes per deployment/env)
    location = /config.js {
        add_header Cache-Control "no-store, must-revalidate";
        expires off;
    }

    # index.html should not be cached so new builds are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        expires off;
    }

    # Hashed assets can be cached aggressively
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
