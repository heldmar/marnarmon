# MarNarMon host configuration
# Copied to /etc/marnarmon/config.yml by install.sh.
# All values can be edited after install; restart the timer/service to apply.

host:
  # Friendly name reported by the API. Empty = system hostname.
  name: ""

collection:
  # How often the collector runs. The installer writes a matching systemd timer.
  interval_minutes: 5
  # Rolling history retention. Older rows are pruned on each collection cycle.
  retention_days: 30

database:
  path: /var/lib/marnarmon/metrics.db

network:
  # Interfaces to include in network in/out totals.
  # Empty list = auto-detect (all up interfaces except loopback and
  # common virtual ones: docker*, veth*, br-*, lo).
  interfaces: []

disks:
  # Mount points to track. Populated by the installer from /etc/fstab.
  # Each entry must be a mount point that exists on the system.
  - /

api:
  host: "0.0.0.0"      # 0.0.0.0 = reachable on the LAN; 127.0.0.1 = local only
  port: 8787
  # Optional bearer token. Empty = no authentication.
  # When set, clients must send: Authorization: Bearer <token>
  # Strongly recommended whenever the API is reachable beyond localhost — it is
  # the only thing protecting metrics AND (if enabled) the system journal.
  token: ""
  # Browser origins allowed to call the API cross-origin (CORS). ["*"] = any,
  # which is fine behind a trusted reverse proxy / on a trusted LAN. Restrict to
  # your dashboard origin(s) when the API could be reached from untrusted
  # networks, e.g. ["https://dashboard.example.net"].
  allowed_origins: ["*"]
  # Default window (minutes) for /metrics/history when none is requested.
  default_history_minutes: 1440

logs:
  # Server Logs feature: browse/filter the systemd journal from the dashboard.
  # OFF by default. When true, the API reads the journal via journalctl, which
  # requires the 'marnarmon' service user to be in the systemd-journal group
  # (install.sh grants this only if you opt in). The dashboard hides the whole
  # "Server Logs" section unless the API reports this as enabled.
  enabled: false
  # Hard cap on lines returned per query (server-side, regardless of client).
  max_lines: 500
  # Lines returned when the client doesn't specify a limit.
  default_lines: 100
  # Default look-back window (minutes) when no window/range is requested. Kept
  # small: an ungrounded keyword search over a long window can be slow on a Pi.
  default_window_minutes: 60
  # Abort a journal query after this many seconds (protects the API).
  timeout_seconds: 8.0
  # Override only if journalctl isn't on PATH for the service.
  journalctl_path: "journalctl"
